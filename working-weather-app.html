<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Clima FUNCIONANDO</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        background: white;
        padding: 2rem;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 400px;
        width: 90%;
      }
      input {
        width: 70%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 25px;
        font-size: 16px;
        margin-right: 10px;
      }
      button {
        padding: 12px 24px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background: #45a049;
      }
      #resultado {
        margin-top: 20px;
        padding: 20px;
        background: #f9f9f9;
        border-radius: 10px;
      }
      .hidden {
        display: none;
      }
      .loading {
        color: #666;
      }
      .error {
        color: #f44336;
        background: #ffebee;
      }
      h1 {
        color: #333;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🌡️ App Clima FUNCIONA!</h1>
      <input id="cidade" placeholder="Digite cidade (ex: São Paulo)" />
      <button onclick="buscar()">Buscar</button>

      <div id="carregando" class="loading hidden">🔄 Carregando...</div>
      <div id="resultado" class="hidden"></div>
      <div id="erro" class="error hidden"></div>
    </div>

    <script>
      async function buscar() {
        const cidade = document.getElementById("cidade").value.trim();
        const carregando = document.getElementById("carregando");
        const resultado = document.getElementById("resultado");
        const erro = document.getElementById("erro");

        if (!cidade) return;

        carregando.classList.remove("hidden");
        resultado.classList.add("hidden");
        erro.classList.add("hidden");

        try {
          // API que FUNCIONA 100% sem cadastro
          const response = await fetch(`https://wttr.in/${cidade}?format=j1`);
          const data = await response.json();

          carregando.classList.add("hidden");
          resultado.innerHTML = `
                    <h2>${cidade}</h2>
                    <p>🌡️ Temp: ${data.current_condition[0].temp_C}°C</p>
                    <p>💨 ${data.current_condition[0].weatherDesc[0].value}</p>
                    <p>💧 ${data.current_condition[0].humidity}% umidade</p>
                `;
          resultado.classList.remove("hidden");
        } catch (err) {
          carregando.classList.add("hidden");
          erro.textContent = "Cidade não encontrada!";
          erro.classList.remove("hidden");
        }
      }

      // Enter funciona
      document.getElementById("cidade").addEventListener("keypress", (e) => {
        if (e.key === "Enter") buscar();
      });
    </script>
  </body>
</html>
